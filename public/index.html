<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AWS SAA-03 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161d27;
    --surface2: #1e2a38;
    --border: #2a3f55;
    --accent: #ff9900;
    --accent-hover: #ffb84d;
    --green: #2ecc71;
    --red: #e74c3c;
    --yellow: #f1c40f;
    --text: #e8edf2;
    --muted: #7d95a8;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; }
  header h1 span { color: var(--accent); }

  #score-display {
    font-size: 0.95rem;
    color: var(--muted);
    font-weight: 600;
  }

  main {
    width: 100%;
    max-width: 820px;
    padding: 40px 20px;
    flex: 1;
  }

  /* ── Start Screen ── */
  #start-screen {
    text-align: center;
    padding: 80px 20px;
  }
  #start-screen h2 { font-size: 2rem; margin-bottom: 12px; }
  #start-screen p { color: var(--muted); margin-bottom: 32px; font-size: 1.05rem; }

  .count-select {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .count-select label { color: var(--muted); }
  .count-select select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 1rem;
  }

  /* ── Quiz Screen ── */
  #quiz-screen { display: none; }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 99px;
    height: 6px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .question-label { color: var(--muted); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

  /* Timer */
  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .timer-ring { position: relative; width: 40px; height: 40px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke: var(--border); stroke-width: 3; }
  .timer-ring .progress { stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.7rem; font-weight: 700;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
  }

  .multi-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .question-text { font-size: 1.05rem; line-height: 1.7; }

  .choices { display: flex; flex-direction: column; gap: 10px; }

  .choice-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 0.97rem;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.15s, background 0.15s;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #1e2340;
  }
  .choice-btn .letter {
    font-weight: 700;
    color: var(--accent);
    min-width: 20px;
  }
  .choice-btn.selected {
    border-color: var(--accent);
    background: #1e2340;
  }
  .choice-btn.correct {
    border-color: var(--green);
    background: rgba(46,204,113,0.1);
  }
  .choice-btn.correct .letter { color: var(--green); }
  .choice-btn.wrong {
    border-color: var(--red);
    background: rgba(231,76,60,0.1);
  }
  .choice-btn.wrong .letter { color: var(--red); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.eliminated {
    opacity: 0.4;
    text-decoration: line-through;
    text-decoration-color: var(--red);
    text-decoration-thickness: 2px;
    border-color: var(--border);
    background: var(--surface2);
  }
  .choice-btn.eliminated .letter { color: var(--muted); }
  .eliminate-hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 8px;
    text-align: right;
  }

  .submit-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
  }

  /* ── Explanation Panel ── */
  #explanation-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-top: 20px;
    display: none;
  }
  #explanation-panel h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 14px;
  }
  #explanation-text {
    font-size: 0.95rem;
    line-height: 1.75;
    color: #c8ccee;
  }
  #explanation-text p { margin-bottom: 10px; }
  #explanation-text ul { margin: 8px 0 10px 20px; }
  #explanation-text li { margin-bottom: 4px; }
  #explanation-text strong { color: var(--text); }
  #explanation-text .kw-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .followup-row {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .followup-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 0.95rem;
  }
  .followup-row input:focus { outline: none; border-color: var(--accent); }

  /* ── Result Screen ── */
  #result-screen {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }
  .result-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 5px solid var(--accent);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 28px;
  }
  .result-circle .big { font-size: 2.2rem; font-weight: 800; }
  .result-circle .sub { font-size: 0.85rem; color: var(--muted); }
  #result-screen h2 { font-size: 1.6rem; margin-bottom: 10px; }
  #result-screen p { color: var(--muted); margin-bottom: 32px; }

  /* ── Buttons ── */
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .btn-ghost:hover { border-color: var(--accent); background: transparent; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>AWS <span>SAA-03</span> Quiz</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <div id="score-display"></div>
    <button class="btn btn-ghost" style="padding:8px 16px;font-size:0.85rem" onclick="showHistory()">History</button>
  </div>
</header>

<!-- History Modal -->
<div id="history-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;overflow-y:auto;padding:40px 20px">
  <div style="max-width:780px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h2 style="font-size:1.2rem">Quiz History</h2>
      <button class="btn btn-ghost" style="padding:6px 14px" onclick="closeHistory()">✕ Close</button>
    </div>
    <div id="history-content"></div>
  </div>
</div>

<main>

  <!-- Start -->
  <div id="start-screen">
    <h2>Ready to study?</h2>
    <p>652 questions from the AWS Solutions Architect exam bank.</p>
    <div class="count-select">
      <label>Questions per round:</label>
      <select id="q-count">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="50">50</option>
        <option value="65">65</option>
      </select>
    </div>
    <button class="btn" onclick="startQuiz()">Start Quiz</button>
  </div>

  <!-- Quiz -->
  <div id="quiz-screen" style="display:none">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="question-meta">
      <span class="question-label" id="question-label">Question 1 of 10</span>
      <div class="timer-wrap">
        <div class="timer-ring">
          <svg width="40" height="40" viewBox="0 0 40 40">
            <circle cx="20" cy="20" r="17" />
            <circle class="progress" id="timer-ring-circle" cx="20" cy="20" r="17"
              stroke-dasharray="106.8" stroke-dashoffset="0" />
          </svg>
          <span class="timer-text" id="timer-text">--:--</span>
        </div>
      </div>
    </div>

    <div class="question-card">
      <div id="multi-badge" class="multi-badge" style="display:none">Choose Two</div>
      <p class="question-text" id="question-text"></p>
    </div>

    <div class="choices" id="choices"></div>
    <div class="eliminate-hint">Right-click a choice to eliminate it</div>

    <div class="submit-row" style="margin-top:16px">
      <button class="btn" id="submit-btn" onclick="submitAnswer()" disabled>Submit</button>
    </div>

    <div id="explanation-panel">
      <h3>Claude's Explanation</h3>
      <div id="explanation-text"></div>
      <div class="followup-row" id="followup-row" style="display:none">
        <input type="text" id="followup-input" placeholder="Ask a follow-up question..."
               onkeydown="if(event.key==='Enter') sendFollowup()" />
        <button class="btn" id="followup-btn" onclick="sendFollowup()">Ask</button>
      </div>
    </div>

    <div class="submit-row" style="margin-top:16px">
      <button class="btn btn-ghost" id="next-btn" style="display:none" onclick="nextQuestion()">
        Next Question →
      </button>
    </div>
  </div>

  <!-- Result -->
  <div id="result-screen" style="display:none">
    <div class="result-circle">
      <span class="big" id="final-score"></span>
      <span class="sub">score</span>
    </div>
    <h2 id="result-title"></h2>
    <p id="result-msg"></p>
    <div style="display:flex; gap:12px; justify-content:center">
      <button class="btn" onclick="startQuiz()">Play Again</button>
      <button class="btn btn-ghost" onclick="showStart()">Change Settings</button>
    </div>
  </div>

</main>

<script>
  let quizTotalTime = 0;
  let questions = [], currentIdx = 0, score = 0;
  let timerInterval = null, timeLeft = 0;
  let selectedLetters = [], answered = false;
  let claudeMessages = [];
  let quizStartTime = null, questionStartTime = null, quizStartTimeStr = null;
  let questionLog = [];

  function showStart() {
    document.getElementById('start-screen').style.display = 'block';
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('score-display').textContent = '';
  }

  async function startQuiz() {
    try {
      const count = document.getElementById('q-count').value;
      const res = await fetch(`/api/questions?count=${count}`);
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      questions = data.questions;
      currentIdx = 0;
      score = 0;
      questionLog = [];
      quizStartTime = Date.now();
      const now = new Date();
      quizStartTimeStr = now.toTimeString().slice(0, 8);
      quizTotalTime = questions.length * 120;

      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      startTimer();
      showQuestion();
    } catch (err) {
      alert('Failed to load questions: ' + err.message);
    }
  }

  function showQuestion() {
    const q = questions[currentIdx];
    answered = false;
    selectedLetters = [];
    claudeMessages = [];

    // Progress
    const pct = (currentIdx / questions.length) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('question-label').textContent =
      `Question ${currentIdx + 1} of ${questions.length}`;
    document.getElementById('score-display').textContent =
      `Score: ${score} / ${currentIdx}`;

    // Multi badge
    const multiBadge = document.getElementById('multi-badge');
    if (q.num_answers > 1) {
      multiBadge.textContent = `Choose ${q.num_answers === 2 ? 'Two' : q.num_answers === 3 ? 'Three' : q.num_answers}`;
      multiBadge.style.display = '';
    } else {
      multiBadge.style.display = 'none';
    }

    // Split last sentence onto its own line
    const qEl = document.getElementById('question-text');
    const sentenceMatch = q.question.match(/^([\s\S]+?)\s+((?:Which|What|How|Who|Where|When)[^.?]+\?)\s*$/);
    if (sentenceMatch) {
      qEl.innerHTML = `${sentenceMatch[1]}<br><br><span style="color:var(--accent);font-weight:600">${sentenceMatch[2]}</span>`;
    } else {
      qEl.textContent = q.question;
    }

    // Choices
    const container = document.getElementById('choices');
    container.innerHTML = '';
    for (const [letter, text] of Object.entries(q.choices)) {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="letter">${letter}</span><span>${text}</span>`;
      btn.onclick = () => toggleChoice(letter, btn, q.num_answers);
      btn.oncontextmenu = (e) => {
        e.preventDefault();
        if (answered) return;
        if (btn.classList.contains('eliminated')) {
          btn.classList.remove('eliminated');
        } else {
          btn.classList.remove('selected');
          selectedLetters = selectedLetters.filter(l => l !== letter);
          document.getElementById('submit-btn').disabled =
            q.num_answers > 1 ? selectedLetters.length < q.num_answers : selectedLetters.length === 0;
          btn.classList.add('eliminated');
        }
      };
      container.appendChild(btn);
    }

    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').style.display = '';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('explanation-panel').style.display = 'none';
    const expEl = document.getElementById('explanation-text');
    expEl.innerHTML = '';
    expEl.dataset.raw = '';
    document.getElementById('followup-row').style.display = 'none';

    questionStartTime = Date.now();
  }

  function toggleChoice(letter, btn, numAnswers) {
    if (answered || btn.classList.contains('eliminated')) return;
    if (numAnswers > 1) {
      if (selectedLetters.includes(letter)) {
        selectedLetters = selectedLetters.filter(l => l !== letter);
        btn.classList.remove('selected');
      } else if (selectedLetters.length < numAnswers) {
        selectedLetters.push(letter);
        btn.classList.add('selected');
      }
      document.getElementById('submit-btn').disabled = selectedLetters.length < numAnswers;
    } else {
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      selectedLetters = [letter];
      btn.classList.add('selected');
      document.getElementById('submit-btn').disabled = false;
    }
  }

  function submitAnswer() {
    if (answered || selectedLetters.length === 0) return;
    answered = true;
    clearInterval(timerInterval);

    const q = questions[currentIdx];
    const correctLetters = q.answer.split(',').sort();
    const userLetters = [...selectedLetters].sort();
    const isCorrect = JSON.stringify(userLetters) === JSON.stringify(correctLetters);

    // Highlight choices
    document.querySelectorAll('.choice-btn').forEach(btn => {
      const letter = btn.querySelector('.letter').textContent;
      btn.disabled = true;
      if (correctLetters.includes(letter)) {
        btn.classList.remove('eliminated');
        btn.classList.add('correct');
      } else if (userLetters.includes(letter) && !correctLetters.includes(letter)) {
        btn.classList.add('wrong');
      }
    });

    const timeTaken = Math.round((Date.now() - questionStartTime) / 1000);
    questionLog.push({
      question_num: q.question_num,
      question: q.question.slice(0, 80) + '...',
      user_answer: userLetters.join(','),
      correct_answer: q.answer,
      correct: isCorrect,
      time_taken_seconds: timeTaken,
    });

    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = '';

    if (isCorrect) {
      score++;
      document.getElementById('score-display').textContent =
        `Score: ${score} / ${currentIdx + 1}`;
    } else {
      streamExplanation(q, userLetters.join(','));
    }
  }

  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code style="background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:0.9em">$1</code>')
      .replace(/^### (.+)$/gm, '<strong style="color:var(--accent)">$1</strong>')
      .replace(/^## (.+)$/gm, '<strong style="color:var(--accent)">$1</strong>')
      .replace(/^(Keywords to watch for:.*)/gm, '<div class="kw-section"><strong style="color:var(--yellow)">$1</strong>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/gs, m => `<ul>${m}</ul>`)
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>');
  }

  async function streamExplanation(q, userAnswer) {
    const panel = document.getElementById('explanation-panel');
    const textEl = document.getElementById('explanation-text');
    panel.style.display = 'block';
    textEl.dataset.raw = '';
    textEl.innerHTML = '<span style="color:var(--muted)">Claude is thinking...</span>';
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

    try {
      const res = await fetch('/api/explain', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question: q.question,
          choices: q.choices,
          correct: q.answer,
          user_answer: userAnswer,
          messages: claudeMessages,
        })
      });

      if (!res.ok) {
        const err = await res.text();
        textEl.innerHTML = `<span style="color:var(--red)">Error: ${err}</span>`;
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '', rawText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = JSON.parse(line.slice(6));
          if (payload.text) {
            rawText += payload.text;
            textEl.dataset.raw = rawText;
            textEl.innerHTML = renderMarkdown(rawText);
          }
          if (payload.done) {
            claudeMessages = payload.messages;
            document.getElementById('followup-row').style.display = 'flex';
          }
        }
      }
    } catch (err) {
      textEl.innerHTML = `<span style="color:var(--red)">Failed to load explanation: ${err.message}</span>`;
    }
  }

  async function sendFollowup() {
    const input = document.getElementById('followup-input');
    const question = input.value.trim();
    if (!question) return;
    input.value = '';

    const btn = document.getElementById('followup-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    const textEl = document.getElementById('explanation-text');
    let rawText = textEl.dataset.raw || '';
    rawText += `\n\n**You:** ${question}\n\n`;
    textEl.dataset.raw = rawText;
    textEl.innerHTML = renderMarkdown(rawText);

    claudeMessages.push({ role: 'user', content: question });

    const q = questions[currentIdx];
    const res = await fetch('/api/explain', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: q.question,
        choices: q.choices,
        correct: q.answer,
        user_answer: '',
        messages: claudeMessages,
      })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = JSON.parse(line.slice(6));
        if (payload.text) {
          rawText += payload.text;
          textEl.dataset.raw = rawText;
          textEl.innerHTML = renderMarkdown(rawText);
        }
        if (payload.done) claudeMessages = payload.messages;
      }
    }

    btn.disabled = false;
    btn.innerHTML = 'Ask';
  }

  function nextQuestion() {
    currentIdx++;
    if (currentIdx >= questions.length) {
      showResult();
    } else {
      if (timeLeft > 0) {
        timerInterval = setInterval(() => {
          timeLeft--;
          updateTimerDisplay();
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timeLeft = 0;
            updateTimerDisplay();
          }
        }, 1000);
      }
      showQuestion();
    }
  }

  async function showResult() {
    clearInterval(timerInterval);
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';

    const durationSeconds = Math.round((Date.now() - quizStartTime) / 1000);
    await fetch('/api/history/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        start_time: quizStartTimeStr,
        duration_seconds: durationSeconds,
        score,
        total: questions.length,
        questions: questionLog,
      })
    });

    const total = questions.length;
    const pct = Math.round((score / total) * 100);
    document.getElementById('final-score').textContent = `${score}/${total}`;

    let title, msg;
    if (pct >= 80) { title = "Excellent work!"; msg = "You're well prepared for the exam."; }
    else if (pct >= 60) { title = "Good effort!"; msg = "Keep reviewing and you'll ace it."; }
    else { title = "Keep studying!"; msg = "Review the explanations and try again."; }

    document.getElementById('result-title').textContent = title;
    document.getElementById('result-msg').textContent = msg;
    document.getElementById('score-display').textContent = `Score: ${score} / ${total}`;
  }

  // History
  async function showHistory() {
    try {
    const modal = document.getElementById('history-modal');
    const content = document.getElementById('history-content');
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
    content.innerHTML = '<p style="color:var(--muted)">Loading...</p>';

    const res = await fetch('/api/history');
    if (!res.ok) throw new Error('Failed to load history: ' + res.status);
    const history = await res.json();

    if (!history.length) {
      content.innerHTML = '<p style="color:var(--muted)">No quizzes taken yet.</p>';
      return;
    }

    const rows = [...history].reverse().map(q => {
      const mins = Math.floor(q.duration_seconds / 60);
      const secs = q.duration_seconds % 60;
      const duration = `${mins}m ${secs}s`;
      const pctColor = q.percentage >= 80 ? 'var(--green)' : q.percentage >= 60 ? 'var(--yellow)' : 'var(--red)';
      const wrongQs = q.questions.filter(r => !r.correct);

      const wrongRows = wrongQs.map(r => `
        <tr style="font-size:0.82rem;color:var(--muted)">
          <td style="padding:6px 8px">Q${r.question_num}</td>
          <td style="padding:6px 8px">${r.question}</td>
          <td style="padding:6px 8px;color:var(--red)">${r.user_answer}</td>
          <td style="padding:6px 8px;color:var(--green)">${r.correct_answer}</td>
          <td style="padding:6px 8px">${r.time_taken_seconds}s</td>
        </tr>`).join('');

      return `
        <div style="border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:var(--surface2);cursor:pointer"
               onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
            <div>
              <span style="font-weight:700">Quiz #${q.id}</span>
              <span style="color:var(--muted);margin-left:12px;font-size:0.85rem">${q.date} at ${q.start_time}</span>
            </div>
            <div style="display:flex;gap:20px;align-items:center;font-size:0.9rem">
              <span style="color:${pctColor};font-weight:700">${q.score}/${q.total} (${q.percentage}%)</span>
              <span style="color:var(--muted)">⏱ ${duration}</span>
              <span style="color:var(--muted)">▾</span>
            </div>
          </div>
          <div style="display:none;padding:16px 20px">
            ${wrongQs.length === 0
              ? '<p style="color:var(--green);font-size:0.9rem">Perfect score! All answers correct.</p>'
              : `<p style="color:var(--muted);font-size:0.85rem;margin-bottom:10px">Incorrect answers:</p>
                 <table style="width:100%;border-collapse:collapse">
                   <thead>
                     <tr style="font-size:0.8rem;color:var(--muted);text-align:left;border-bottom:1px solid var(--border)">
                       <th style="padding:6px 8px">#</th>
                       <th style="padding:6px 8px">Question</th>
                       <th style="padding:6px 8px">Your Answer</th>
                       <th style="padding:6px 8px">Correct</th>
                       <th style="padding:6px 8px">Time</th>
                     </tr>
                   </thead>
                   <tbody>${wrongRows}</tbody>
                 </table>`
            }
          </div>
        </div>`;
    }).join('');

    content.innerHTML = rows;
    } catch(err) {
      document.getElementById('history-content').innerHTML =
        `<p style="color:var(--red)">Error: ${err.message}</p>`;
    }
  }

  function closeHistory() {
    document.getElementById('history-modal').style.display = 'none';
    document.body.style.overflow = '';
  }

  // Timer
  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = quizTotalTime;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timeLeft = 0;
        updateTimerDisplay();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('timer-text').textContent =
      `${mins}:${secs.toString().padStart(2, '0')}`;

    const circle = document.getElementById('timer-ring-circle');
    const circumference = 106.8;
    const offset = circumference * (1 - timeLeft / quizTotalTime);
    circle.style.strokeDashoffset = offset;

    const warnAt = quizTotalTime * 0.25;
    const dangerAt = quizTotalTime * 0.1;
    if (timeLeft <= dangerAt) circle.style.stroke = '#e74c3c';
    else if (timeLeft <= warnAt) circle.style.stroke = '#f1c40f';
    else circle.style.stroke = 'var(--accent)';
  }
</script>
</body>
</html>
